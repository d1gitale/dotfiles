# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = zen-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, N, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, [workspace 1 silent] $browser
bindd = SUPER ALT, B, Browser (private), exec, $browser --private-window
bindd = SUPER, M, Music, exec, [workspace 5 silent] omarchy-launch-or-focus spotify
# bindd = SUPER, V, Editor, exec, omarchy-launch-editor
# bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
bindd = SUPER, X, Telegram, exec, [workspace 2 silent] omarchy-launch-or-focus ~/Downloads/tsetup.6.1.4/Telegram/Telegram
# bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER, D, Discord, exec, omarchy-launch-or-focus discord
bindd = SUPER, S, Steam, exec, omarchy-launch-or-focus steam
# bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
# bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password


# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu
